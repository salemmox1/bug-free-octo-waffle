name: ESP32 Build

on:
  push:
    paths:
      - 'esp.zip'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git wget flex bison gperf python3 python3-pip python3-setuptools python3-venv \
            cmake ninja-build ccache libffi-dev libssl-dev dfu-util libusb-1.0-0

      - name: Setup ESP-IDF v4.1
        run: |
          cd $HOME
          git clone --recursive https://github.com/espressif/esp-idf.git
          cd esp-idf
          git checkout 5ef1b390026270503634ac3ec9f1ec2e364e23b2
          git submodule update --init --recursive
          
          # Downgrade setuptools to fix pkg_resources error in IDF v4.1
          python3 -m pip install --upgrade "setuptools<58.0.0" pip wheel
          
          ./install.sh esp32

      - name: Extract and Locate Project
        run: |
          unzip esp.zip -d project
          PROJECT_DIR=$(find project -name "CMakeLists.txt" ! -path "*/main/*" ! -path "*/components/*" | head -n 1 | xargs dirname)
          echo "PROJECT_PATH=$PROJECT_DIR" >> $GITHUB_ENV

      - name: Build Firmware
        run: |
          . $HOME/esp-idf/export.sh
          cd ${{ env.PROJECT_PATH }}
          idf.py set-target esp32
          idf.py build

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32-firmware
          path: |
            ${{ env.PROJECT_PATH }}/build/bootloader/bootloader.bin
            ${{ env.PROJECT_PATH }}/build/partition_table/partition-table.bin
            ${{ env.PROJECT_PATH }}/build/*.bin
          if-no-files-found: error

name: ESP32 Build

on:
  push:
    paths:
      - 'esp.zip'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract esp.zip
        run: |
          unzip esp.zip -d project
          echo "=== Project structure ==="
          find project -name "CMakeLists.txt" | sort

      - name: Install ESP-IDF v4.1 dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            git wget flex bison gperf python3 python3-pip \
            cmake ninja-build ccache libffi-dev libssl-dev \
            dfu-util libusb-1.0-0

      - name: Clone ESP-IDF v4.1 (exact commit)
        run: |
          git clone --recursive https://github.com/espressif/esp-idf.git $HOME/esp-idf
          cd $HOME/esp-idf
          git checkout 5ef1b390026270503634ac3ec9f1ec2e364e23b2
          git submodule update --init --recursive

      - name: Install ESP-IDF tools
        run: |
          cd $HOME/esp-idf
          ./install.sh

      - name: Build firmware
        run: |
          . $HOME/esp-idf/export.sh

          PROJECT_DIR=$(find project -maxdepth 3 -name "CMakeLists.txt" \
            ! -path "*/main/*" ! -path "*/components/*" | head -1 | xargs dirname)
          echo "Building from: $PROJECT_DIR"

          cd "$PROJECT_DIR"
          idf.py set-target esp32
          idf.py build

      - name: Upload firmware artifacts
        uses: actions/upload-artifact@v4
        with:
          name: esp32-firmware-${{ github.sha }}
          path: |
            project/**/build/*.bin
            project/**/build/bootloader/bootloader.bin
            project/**/build/partition_table/partition-table.bin
          if-no-files-found: error
          retention-days: 30

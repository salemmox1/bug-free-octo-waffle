name: Setup SSH Runner + Bore Forwarding

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  setup-ssh-runner:
    runs-on: ubuntu-latest
    env:
      USERNAME: runner
      PASSWORD: runner

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Ensure runner user has sudo + password
        run: |
          echo "${USERNAME}:${PASSWORD}" | sudo chpasswd
          echo "${USERNAME} ALL=(ALL) NOPASSWD:ALL" | sudo tee /etc/sudoers.d/${USERNAME}

      - name: Install OpenSSH server
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq openssh-server
          sudo systemctl enable ssh
          sudo systemctl start ssh

      - name: Extract esp.zip to Home Directory
        run: |
          sudo apt-get install -y unzip
          unzip esp.zip -d /home/${USERNAME}/

      - name: Install Bore
        run: |
          wget https://github.com/ekzhang/bore/releases/download/v0.5.1/bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz
          tar -xf bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz
          sudo mv bore /usr/local/bin/
          rm bore-v0.5.1-x86_64-unknown-linux-musl.tar.gz

      - name: Start Bore Forwarding
        run: |
          bore local 22 --to bore.pub > bore.log 2>&1 &
          sleep 5

      - name: Show SSH Connection Info
        run: |
          REMOTE_PORT=$(grep -oP 'remote port: \K\d+' bore.log)
          echo "=== SSH CONNECTION INFO ==="
          echo "ADDRESS: bore.pub"
          echo "PORT: ${REMOTE_PORT}"
          echo "USERNAME: ${USERNAME}"
          echo "PASSWORD: ${PASSWORD}"
          echo
          echo ">>> Connect with:"
          echo "    ssh ${USERNAME}@bore.pub -p ${REMOTE_PORT}"
          echo
          echo ">>> Your files are located in: /home/${USERNAME}/"
          echo
          echo ">>> Keeping runner alive..."
          tail -f /dev/null
